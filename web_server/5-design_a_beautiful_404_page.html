<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Lost in Space</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #141E30, #243B55);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 120px;
            margin: 0;
            animation: float 3s ease-in-out infinite;
        }

        p {
            font-size: 22px;
            margin: 20px 0;
        }

        a {
            display: inline-block;
            padding: 12px 25px;
            background: #ff4b2b;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s ease;
        }

        a:hover {
            background: #ff416c;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Oops! You seem to be lost in space.</p>
        <p>Ceci n'est pas une page</p>
        <a href="/">Go Home</a>
    </div>
</body>
</html>
